# AI Threat → Technical-Control Catalogue.
#
# Hand-authored (NOT generated by tools/scaffold.py). Source: the risk ×
# capability × platform matrix, normalised and cross-mapped into this model.
# Keep in lockstep with spec/control-plane-layers.yaml and
# docs/threat-control-catalogue.md.
#
# This catalogue is the RISK-DRIVEN complement to the LIFECYCLE-DRIVEN register
# in spec/domains.yaml. domains.yaml enumerates 59 controls by delivery phase;
# this file enumerates the 60 technical capabilities that answer each concrete
# AI/agent risk, and maps every one back to a lifecycle domain (`domains`), an
# architectural enforcement point (`layer`, see control-plane-layers.yaml) and
# an exit gate. Nothing here replaces domains.yaml — it makes it risk-addressable.

version: 1

# --- Build-vs-buy signal ------------------------------------------------------
# Derived from `platforms` = the count of commercial platforms observed to offer
# the capability. The count is a MARKET-MATURITY signal, not a control priority:
# a control can be mandatory AND have zero products (you must build it), or
# optional AND commoditised. Read it to decide sourcing, never to decide need.
build_vs_buy:
  build:      "0 platforms — no market product; architecture-owned, specify and build natively."
  emerging:   "1-5 platforms — thin/immature market; build or partner, expect gaps."
  buy_select: "6-15 platforms — competitive market; select against requirements and integrate."
  commodity:  "16+ platforms — mature market; procure to spec, differentiate on integration."

# --- Standards anchors per tier (informative) --------------------------------
standards_anchors:
  IM:  [OWASP LLM Top 10, "NIST AI RMF · MEASURE", MITRE ATLAS]
  MU:  [OWASP LLM Top 10, "NIST AI RMF · MANAGE", MITRE ATLAS]
  AG:  ["OWASP Top 10 for LLM Apps (Agentic)", MITRE ATLAS, "NIST AI RMF · MANAGE"]
  SYS: [OWASP NHI Top 10, NIST SP 800-207, SLSA, CISA SBOM]

# --- Informative vendor market segments --------------------------------------
# The matrix columns, grouped. Names are indicative of a segment, not endorsed
# or exhaustive; treat the per-control `platforms` COUNT as the durable signal.
market_segments:
  - AI-SPM & Posture
  - Runtime Guardrails
  - Agent Authorization
  - Supply Chain & Testing
  - Data Security for AI
  - Confidential AI
  - AI Governance
  - AI Evaluation

# --- Risk tiers → risks → technical-capability controls -----------------------
tiers:
  - id: IM
    name: Inherent Model Risks
    summary: Risks intrinsic to the model itself, independent of how it is used.
    risks:
      - id: R-IM-01
        name: Correctness
        controls:
          - { id: TC-001, name: "Self-Consistency / Ensemble Cross-Checking",        layer: runtime-mediation, domains: [D4],     gate: B, platforms: 0,  signal: build }
          - { id: TC-002, name: "Calibrated Confidence Scoring & Thresholding",       layer: runtime-mediation, domains: [D4],     gate: B, platforms: 0,  signal: build }
      - id: R-IM-02
        name: Opacity
        controls:
          - { id: TC-003, name: "Inference Telemetry & Trace Logging",               layer: observability,     domains: [D4, D8], gate: B, platforms: 11, signal: buy_select }
          - { id: TC-004, name: "Feature Attribution / Saliency Analysis",           layer: observability,     domains: [D8],     gate: D, platforms: 0,  signal: build }
          - { id: TC-005, name: "Reasoning / Chain-of-Thought Capture",              layer: observability,     domains: [D4, D8], gate: B, platforms: 11, signal: buy_select }
      - id: R-IM-03
        name: Untestability
        controls:
          - { id: TC-006, name: "Automated Adversarial & Fuzzing Harness",           layer: continuous-testing, domains: [D3],    gate: B, platforms: 17, signal: commodity }
          - { id: TC-007, name: "Behavioral Benchmark & Regression Test Suite",      layer: continuous-testing, domains: [D3],    gate: B, platforms: 21, signal: commodity }
          - { id: TC-008, name: "Drift-Triggered Re-Evaluation Pipeline",            layer: continuous-testing, domains: [D3, D6], gate: B, platforms: 27, signal: commodity }
      - id: R-IM-04
        name: Latent Capability
        controls:
          - { id: TC-009, name: "Capability Elicitation / Jailbreak Probing",        layer: continuous-testing, domains: [D3],    gate: B, platforms: 17, signal: commodity }
          - { id: TC-010, name: "Capability-Scoping Guardrails",                     layer: authorization,      domains: [D2, D4], gate: A, platforms: 10, signal: buy_select }
          - { id: TC-011, name: "Out-of-Scope Request Classifier",                   layer: runtime-mediation,  domains: [D4],    gate: B, platforms: 11, signal: buy_select }
      - id: R-IM-05
