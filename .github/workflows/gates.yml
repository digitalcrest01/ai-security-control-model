name: gates

# Enforce the model as code: policies must parse and pass, evidence must clear
# every gate, and Terraform must be formatted and valid.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  policy:
    name: OPA policies & gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: opa check (all policies parse)
        run: opa check gates domains

      - name: opa fmt (policies are formatted)
        run: opa fmt --list --fail gates

      - name: opa test (gate unit tests)
        run: opa test gates -v

      # Every example evidence file must clear its gate (deny set is empty).
      - name: Evaluate exit gates against example evidence
        run: |
          set -euo pipefail
          declare -A GATES=(
            [a]="gate_a"
            [b]="gate_b"
            [c]="gate_c"
            [d]="gate_d"
          )
          fail=0
          for g in a b c d; do
            pkg="${GATES[$g]}"
            input="gates/examples/gate-${g}.input.json"
            deny=$(opa eval -f raw -d gates -i "$input" "data.gates.${pkg}.deny")
            if [ "$deny" != "[]" ]; then
              echo "::error::Gate ${g^^} failed for $input: $deny"
              fail=1
            else
              echo "Gate ${g^^}: PASS"
            fi
          done
          exit $fail

  terraform:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: terraform validate (each module & environment)
        run: |
          set -euo pipefail
          for dir in modules/* environments/* domains/*/terraform; do
            ls "$dir"/*.tf >/dev/null 2>&1 || continue
            echo "== validating $dir =="
            terraform -chdir="$dir" init -backend=false -input=false >/dev/null
            terraform -chdir="$dir" validate
          done

  evidence:
    name: Gate A evidence chain (D2 slice)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet pyyaml

      - name: Install OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      # Build Gate A evidence from the estate inventory + the provisioned
      # identities (fixture stands in for `terraform show -json` since CI has no
      # cloud credentials), then prove the gate passes on that derived evidence.
      - name: Collect evidence & evaluate Gate A
        run: |
          set -euo pipefail
          python3 tools/collect_gate_a_evidence.py \
            --estate environments/sandbox/estate.yaml \
            --provisioned environments/sandbox/provisioned.sample.json \
            --out gate-a.evidence.json
          echo "--- derived evidence ---"; cat gate-a.evidence.json
          deny=$(opa eval -f raw -d gates -i gate-a.evidence.json 'data.gates.gate_a.deny')
          if [ "$deny" != "[]" ]; then
            echo "::error::Gate A failed on collected evidence: $deny"
            exit 1
          fi
          echo "Gate A on collected D2-slice evidence: PASS"

  spec:
    name: Spec integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # spec/*.yaml is the generated source of truth and must stay in lockstep
      # with tools/scaffold.py. Domain working files (READMEs, controls.yaml,
      # terraform, policies) are scaffolded once then human-owned, so they are
      # intentionally NOT diffed here.
      - name: spec/ is in sync with the generator
        run: |
          set -euo pipefail
          REPO="$PWD" python3 tools/scaffold.py
          if ! git diff --exit-code -- spec/; then
            echo "::error::spec/ is out of sync. Run 'python3 tools/scaffold.py' and commit."
            exit 1
          fi
