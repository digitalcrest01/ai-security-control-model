# AI Security Control-Plane Layers — the reference-architecture view.
#
# Hand-authored (NOT generated by tools/scaffold.py). Keep in lockstep with
# docs/threat-control-catalogue.md and spec/threat-control-catalogue.yaml.
#
# The lifecycle model (spec/domains.yaml) answers "WHEN in the delivery
# lifecycle is a control owned?" (phases D1-D8, gates A-D). This file answers
# the orthogonal question: "WHERE in the runtime/agent architecture is a
# control enforced?" — the enforcement point at which a technical capability
# actually sits. Every control-plane layer maps back to one or more lifecycle
# domains, so the two views reconcile rather than compete.

version: 1
layers:
  - id: runtime-mediation
    name: Runtime Mediation
    domains: [D4]
    gate: B
    enforcement_point: "Inline request/response interception at inference time."
    description: >
      The pre- and post-processing pipeline that inspects, transforms, or blocks
      prompts and model outputs on the live request path. Where grounding,
      guardrail enforcement, output moderation and schema validation execute.

  - id: observability
    name: Observability
    domains: [D4, D8]
    gate: B
    enforcement_point: "Telemetry, tracing and behavioral baselining over model/agent behavior."
    description: >
      Non-blocking capture of inference telemetry, reasoning traces, behavioral
      baselines and drift/anomaly signals. Feeds runtime detection (D4) and the
      audit/evidence chain (D8). Detects rather than prevents.

  - id: continuous-testing
    name: Continuous Testing
    domains: [D3]
    gate: B
    enforcement_point: "Pre-deployment and drift-triggered evaluation harnesses."
    description: >
      Adversarial/fuzzing harnesses, behavioral benchmark and regression suites,
      capability-elicitation probes and agent-workflow red-teaming, run in CI and
      re-triggered on drift. The proving ground before a change can exit Gate B.

  - id: authorization
    name: Authorization
    domains: [D2]
    gate: A
    enforcement_point: "Policy decision/enforcement for what an identity or agent may do."
    description: >
      Capability-scoping, least-privilege tool/action scoping and policy-as-code
      action guardrails evaluated per request. The agent-era extension of
      identity and entitlement enforcement.

  - id: data-boundary
    name: Data Boundary
    domains: [D5, D4]
    gate: C
    enforcement_point: "The trust boundary where data enters or leaves the model."
    description: >
      Input sanitization/normalization, sensitive-data classification and
      need-to-know, DLP, PII/secret-leakage detection and encrypted inference —
      controls that police what data crosses into context and out through output.

  - id: kill-switch
    name: Kill Switch
    domains: [D4]
    gate: B
    enforcement_point: "Fail-safe interruption of a running model or agent."
    description: >
      Circuit breakers, automated containment/rollback triggers and graceful
      degradation/fail-safe fallback. The last-resort control that halts unsafe
      behavior when detection fires.

  - id: tool-gateway
    name: Tool Gateway
    domains: [D2, D4]
    gate: B
    enforcement_point: "Broker mediating agent-to-tool / MCP calls."
    description: >
      The mediation point for every tool or MCP invocation an agent makes:
      brokering, rate limiting/abuse throttling, and signed tool-manifest /
      provenance verification. The choke point for agentic supply-chain trust.

  - id: memory-governance
    name: Memory Governance
    domains: [D4, D5]
    gate: B
    enforcement_point: "Integrity, provenance and bounding of agent context/memory."
    description: >
      Source validation and isolation of context, context-poisoning / memory
      integrity detection, and memory-horizon bounding. Emerging enforcement
      point specific to stateful, long-running agents.

  - id: sandbox
    name: Sandbox
    domains: [D7]
    gate: D
    enforcement_point: "Isolated execution environment for agent actions and inference."
    description: >
      Action sandboxing and execution isolation — running consequential agent
      actions inside a contained, revocable runtime so blast radius is bounded
      by construction.

  - id: inventory
    name: Inventory
    domains: [D1]
    gate: A
    enforcement_point: "Discovery and registration of agents, models and AI assets."
    description: >
      Continuous discovery and inventory of agents and AI assets — including
      rogue/shadow agents. The precondition for every downstream control: you
      cannot govern what you have not enumerated.

  - id: identity
    name: Identity
    domains: [D2]
    gate: A
    enforcement_point: "Issuance and lifecycle of non-human / agent identities."
    description: >
      Non-human identity (NHI) issuance, binding and lifecycle for agents and
      services — the primary perimeter, established before authorization can
      make meaningful decisions.

  - id: lifecycle-governance
    name: Lifecycle Governance
    domains: [D8, D6]
    gate: D
    enforcement_point: "Attestation and accountability over the agent/model lifecycle."
    description: >
      Lifecycle governance and attestation, AI supply-chain integrity and AIBOM.
      The accountability layer that makes agents and their supply chain
      governed, attested and auditable end to end.
